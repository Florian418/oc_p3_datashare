spring.application.name=backend

# logs structurés JSON (natif Spring Boot depuis 3.4, pas de dépendance ajoutée)
logging.structured.format.console=ecs

# schéma géré par Flyway (db/migration), Hibernate ne doit jamais le modifier lui-même
spring.jpa.hibernate.ddl-auto=validate

# erreurs de validation (@Valid) renvoyées au format RFC 7807 (ProblemDetail), comme les erreurs métier
spring.mvc.problemdetails.enabled=true

datashare.storage.endpoint=${GARAGE_S3_ENDPOINT:http://localhost:3900}
datashare.storage.region=garage
datashare.storage.bucket=${GARAGE_BUCKET}
datashare.storage.access-key=${GARAGE_ACCESS_KEY}
datashare.storage.secret-key=${GARAGE_SECRET_KEY}

datashare.jwt.secret=${JWT_SECRET}
datashare.jwt.expiration=${JWT_EXPIRATION:PT24H}
