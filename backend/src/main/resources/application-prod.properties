# Profil actif uniquement en production (SPRING_PROFILES_ACTIVE=prod) — le jar packagé n'a pas
# spring-boot-docker-compose (scope developmentOnly, absent du jar), qui gère cette connexion
# automatiquement en dev. Sans ce profil, un jar packagé ne saurait pas se connecter à Postgres.
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
